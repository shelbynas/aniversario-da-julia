<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Brooklyn 99 - Aniversário</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f4d03f, #1f4e79);
    color: white;
    text-align: center;
}

/* Telas */
.screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active {
    display: flex;
}

/* Caixa */
.card {
    background: rgba(0,0,0,0.25);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 800px;
}

/* IMAGEM AJUSTADA PERFEITA */
.banner-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 15px;
    margin-bottom: 20px;
}

.banner-container img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* preenche bonito */
}

/* Botão */
button {
    background-color: #1f4e79;
    color: #f4d03f;
    border: none;
    padding: 15px 30px;
    font-size: 1.2em;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background-color: #163a5c;
}

h1 {
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- Tela 1 -->
<div id="screen1" class="screen active">
    <div class="card">
        <h1>NINE-NINE!! 🎉</h1>
        <button onclick="nextScreen()">clique aqui julia</button>
    </div>
</div>

<!-- Tela 2 -->
<div id="screen2" class="screen">
    <div class="card">

        <!-- IMAGEM PERFEITA -->
        <div class="banner-container">
            <img src="equipe broolyn.jpeg">
        </div>

        <h1>Feliz aniversário mimizenta!! 🎂</h1>
        <p style="font-size: 1.3em;">Obrigado por ser nerd 💙</p>
        <p style="margin-top:20px; font-style: italic;">- Gabriel Java</p>

    </div>
</div>

<script>
function nextScreen() {
    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");
}
</script>

</body>
</html>
